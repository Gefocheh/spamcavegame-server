<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>spamCaveGame</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:18px;pointer-events:none;}
#debug{position:fixed;bottom:10px;left:10px;color:white;font-family:monospace;background:rgba(0,0,0,0.5);padding:5px;z-index:1000;}
#onlineToggle{position:fixed;top:10px;left:10px;z-index:1000;}
.nickname{position:absolute;color:white;font-family:monospace;font-size:12px;text-align:center;pointer-events:none;}
</style>
</head>
<body>
<div id="crosshair">+</div>
<div id="debug"></div>
<button id="serverMenuToggle" style="position:fixed;top:10px;left:100px;z-index:1000;background:rgba(0,0,0,0.5);border:2px solid gray;color:white;font-family:Trebuchet MS;">Servers</button>
<div id="serverMenu" style="
  display:none;
  position:fixed;
  top:40px;
  left:100px;
  background:rgba(0.1,0.1,0,0.3);
  padding:5px;
  border:2px solid gray;
  z-index:1000;
  max-width:250px;
  color:white;
  font-family:Trebuchet MS;
">
  <div id="serverList"></div>
  <input type="text" id="newServerInput" placeholder="ws://или wss://" style="width:97%;margin-top:5px;border:2px solid gray;background:rgba(0,0,0,0.3);color:white;font-family:Trebuchet MS;">
  <button id="addServerBtn" style="width:100%;margin-top:3px;color:white;background:rgba(0,0,0,0.5);font-family:Trebuchet MS;">Add server</button>
</div>
<button id="onlineToggle" style="background:rgba(0,0,0,0.5);border:2px solid gray;color:white;font-family:Trebuchet MS;">Online: OFF</button>
<input type="text" id="chatInput"
       placeholder="Enter - чат, /команда"
       style="
	     font-family:Trebuchet MS;
         position:fixed;
         bottom:10px;
         left:50%;
         transform:translateX(-50%);
         width:300px;
         padding:5px;
         z-index:2000;
         display:block;
		 background:rgba(0,0,0,0.5);
		 border:2px solid gray;
       ">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="game.js">
</script>
</body>
</html>
